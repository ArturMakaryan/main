<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hug Text Button Preview</title>
  <link rel="stylesheet" href="uiverse-button.css">
</head>
<body>
  <div class="btn-wrapper">
    <button class="btn" type="button" aria-label="Register">
      <span class="txt-wrapper">
        <span class="txt-1" aria-hidden="true">
          <span class="btn-letter">R</span><span class="btn-letter">e</span><span class="btn-letter">g</span><span class="btn-letter">i</span><span class="btn-letter">s</span><span class="btn-letter">t</span><span class="btn-letter">e</span><span class="btn-letter">r</span>
        </span>
        <span class="txt-2" aria-hidden="true">
          <span class="btn-letter">R</span><span class="btn-letter">e</span><span class="btn-letter">g</span><span class="btn-letter">i</span><span class="btn-letter">s</span><span class="btn-letter">t</span><span class="btn-letter">e</span><span class="btn-letter">r</span>
        </span>
      </span>
    </button>
  </div>

  <div class="btn-wrapper">
    <button class="btn btn-gold" type="button" aria-label="Register">
      <span class="txt-wrapper">
        <span class="txt-1" aria-hidden="true">
          <span class="btn-letter">R</span><span class="btn-letter">e</span><span class="btn-letter">g</span><span class="btn-letter">i</span><span class="btn-letter">s</span><span class="btn-letter">t</span><span class="btn-letter">e</span><span class="btn-letter">r</span>
        </span>
        <span class="txt-2" aria-hidden="true">
          <span class="btn-letter">R</span><span class="btn-letter">e</span><span class="btn-letter">g</span><span class="btn-letter">i</span><span class="btn-letter">s</span><span class="btn-letter">t</span><span class="btn-letter">e</span><span class="btn-letter">r</span>
        </span>
      </span>
    </button>
  </div>
</body>
</html>
